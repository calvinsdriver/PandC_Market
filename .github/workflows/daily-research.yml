name: Daily P&C Research Run

on:
  schedule:
    # 8 AM Pacific is 15:00 UTC (16:00 UTC during standard time)
    # We will run this at 15:00 UTC every day.
    - cron: '0 15 1 * *'
  workflow_dispatch: # allow manual triggers

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages or Vercel
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-research:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run P&C Research Script
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          USE_INSECURE_SSL: 1
        run: |
          python service.py --once
          
      - name: Build Static Dashboard
        run: |
          python web.py --build

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      # Optional: To persist output data back to the repo for history
      - name: Commit data files
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@example.com"
          git add output/
          git commit -m "chore: Update daily research data" || echo "No changes to commit"
          git push

  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: run-research
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
